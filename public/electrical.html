<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Электромонтажный цех</title>
    <link rel="stylesheet" href="/style/main.css">
</head>
<body>

<div id="sidebar-placeholder"></div>
    <main class="content">
        <div class="page-header">
            <h1>Электромонтаж</h1>
            <div class="page-controls"> <label for="bplaTypeSelector">Тип БПЛА:</label>
                <select id="bplaTypeSelector"></select>
            </div>
        </div>

        <details class="filter-box" open>
            <summary>🔍 Фильтр и поиск</summary>
            <form id="filterForm" class="filter-form"></form>
        </details>

        <div class="table-container">
            <table id="electricalTable">
                <thead>
                    </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
        <div id="avatar-picker-container"></div>
    </main>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>Добавление / Редактирование борта</h3>
            <form id="boardForm">
                <div class="form-grid">
                    <label for="number">Номер борта:</label>
                    <input type="text" id="number" required>

                    <label for="supplierId">Поставщик:</label>
                    <select id="supplierId">
                        <option value="">-- Выберите поставщика --</option>
                    </select>

                    <label>Тип БПЛА:</label>
                    <div id="bplaTypeDisplay" style="padding: 10px 12px; font-weight: bold;"></div>
                </div>

                <div id="modalPcContainer"></div>

                <fieldset id="paramsFieldset">
                    <legend>Компоненты</legend>
                </fieldset>

            </form>
            <div class="actions">
                <button type="button" id="closeModalBtn" class="btn-secondary">Отмена</button>
                <button type="submit" form="boardForm" id="saveBoardBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="commentTooltip" class="comment-tooltip" style="display: none;"></div>

    <div id="commentModal" class="modal-overlay" style="display: none;">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>Комментарий к параметру</h3>
                <h4 id="commentParamName"></h4>
            </div>
            <div class="modal-body">
                <textarea id="commentTextarea" rows="5" placeholder="Введите ваш комментарий..."></textarea>
                <div class="switch-container">
                    <label for="semiFinishedSwitch" class="switch-label">Статус "Полуфабрикат"</label>
                    <label class="switch">
                        <input type="checkbox" id="semiFinishedSwitch">
                        <span class="slider round"></span>
                    </label>
                </div>
                <p class="modal-hint">Если статус активен, вся строка будет выделена как проблемная.</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="deleteCommentBtn" class="btn-danger-outline">Удалить</button>
                <div class="actions-right">
                    <button type="button" id="closeCommentModal" class="btn-secondary">Отмена</button>
                    <button type="button" id="saveCommentBtn" class="btn-primary">Сохранить</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/electrical.js"></script>
    <script src="/js/include.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
