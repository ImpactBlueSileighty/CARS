<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>ЦАРС | Отдел Настройки</title>
    <link rel="stylesheet" href="style/main.css?v=1.1" />
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <main class="content">
        <h1>Отдел настройки</h1>

        <div class="main-selector-container">
            <label for="bplaTypeSelector">Тип БПЛА:</label>
            <select id="bplaTypeSelector"></select>
        </div>

        <details class="filter-box">
            <summary>🔍 Фильтр и поиск</summary>
            <form id="filterForm" class="filter-form"></form>
        </details>

        <div class="table-container">
            <table id="setupTable">
                <thead>
                    </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div id="addModal" class="modal-overlay">
            <div class="modal-content">
                <h3>Добавить/Изменить борт</h3>
                <form id="boardForm">
                    <div class="form-grid">
                        <label for="bplaId">Тип борта:</label>
                        <select id="bplaId" required></select>
                        <label for="number">Номер борта:</label>
                        <input type="text" id="number" placeholder="Номер борта" required />
                        <label for="supplierId">Поставщик:</label>
                        <select id="supplierId"></select>
                    </div>
                    
                    <fieldset id="paramsFieldset">
                        <legend>Параметры</legend>
                        <p>Сначала выберите тип БПЛА.</p>
                    </fieldset>

                    <div class="actions">
                        <button type="button" id="closeModalBtn" class="btn-secondary">Отмена</button>
                        <button type="submit" class="btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div id="commentModal" class="modal-overlay">
            <div class="modal-content modal-sm">
                
                <div class="modal-header">
                    <h3>Комментарий к параметру</h3>
                    <h4 id="commentParamName">(Параметр)</h4>
                </div>

                <div class="modal-body">
                    <textarea id="commentTextarea" rows="4" placeholder="Введите комментарий..."></textarea>
                    
                    <div class="switch-container">
                        <span class="switch-label">Статус "Полуфабрикат"</span>
                        <label class="switch">
                            <input type="checkbox" id="semiFinishedSwitch">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" id="deleteCommentBtn" class="btn-danger-outline">Удалить</button>
                    <div class="actions-right">
                        <button type="button" id="closeCommentModal" class="btn-secondary">Отмена</button>
                        <button type="button" id="saveCommentBtn" class="btn-primary">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="commentTooltip"></div>

    </main>

    <script src="/js/include.js"></script>
    <script src="/js/setup.js"></script> 
</body>
</html>
