<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>ЦАРС | Сводка</title>
    <link rel="stylesheet" href="style/main.css" />
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="content">
        <h1>Сводка по производству</h1>

        <div class="summary-card">
            <h2>Статистика по поставщикам</h2>
            <div class="table-container">
                <table id="statsTable">
                    <thead>
                        <tr>
                            <th>Поставщик</th>
                            <th>Готово (Сегодня)</th>
                            <th>Готово (Всего)</th>
                            <th>В работе</th>
                            <th>Полуфабрикаты (ПФ)</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody">
                        </tbody>
                    <tfoot id="statsTableFoot">
                        </tfoot>
                </table>
            </div>
        </div>

        <div class="summary-card">
            <h2>Трекер бортов (в работе)</h2>
            
            <form id="filterForm" class="filter-form summary-filter">
                <div class="primary-filters">
                    <label>Номер борта:
                        <input type="text" id="numberFilter" placeholder="Поиск по номеру..." />
                    </label>
                    <label>Поставщик:
                        <select id="supplierFilter">
                            <option value="">Все поставщики</option>
                        </select>
                    </label>
                    <label>Тип БПЛА:
                        <select id="bplaFilter">
                            <option value="">Все типы</option>
                        </select>
                    </label>
                </div>
                <div class="filter-actions">
                    <button type="button" id="exportBtn" class="btn-secondary">📄 Экспорт в Excel</button>
                </div>
            </form>

            <div class="table-container">
                <table id="trackerTable">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Тип БПЛА</th>
                            <th>Поставщик</th>
                            <th>Дата поступления</th>
                            <th>Текущий статус</th>
                        </tr>
                    </thead>
                    <tbody id="trackerTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/include.js"></script>
    <script src="js/summary.js"></script>
</body>
</html>
